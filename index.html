<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Приложение</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.123.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.123.0/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        .card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .card.selected {
            border-color: #3b82f6;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(147, 51, 234, 0.2));
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="bg-gray-900">
    <!-- Главное меню -->
    <div id="menu" class="fixed inset-0 flex items-center justify-center z-20 bg-gradient-to-br from-gray-900 via-purple-900 to-gray-900">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        
        <div class="relative z-10 text-center p-8 max-w-2xl w-full">
            <h1 class="text-5xl font-bold text-white mb-2 tracking-tight">WebAR</h1>
            <p class="text-gray-300 mb-12 text-lg">Выберите контент для AR-опыта</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <!-- Карточка 3D Модель -->
                <div id="card-model" class="card bg-gray-800/80 backdrop-blur-md rounded-2xl p-8 border-2 border-gray-700">
                    <div class="text-6xl mb-4">🤖</div>
                    <h3 class="text-xl font-semibold text-white mb-2">3D Модель Робота</h3>
                    <p class="text-gray-400 text-sm">Интерактивная 3D-модель на маркере</p>
                </div>
                
                <!-- Карточка Видео -->
                <div id="card-video" class="card bg-gray-800/80 backdrop-blur-md rounded-2xl p-8 border-2 border-gray-700">
                    <div class="text-6xl mb-4">🎬</div>
                    <h3 class="text-xl font-semibold text-white mb-2">Демо-Видео</h3>
                    <p class="text-gray-400 text-sm">Видео-контент на маркере</p>
                </div>
            </div>
            
            <button id="start-btn" disabled 
                class="bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-semibold py-4 px-10 rounded-xl text-lg transition-all duration-300 shadow-lg hover:shadow-blue-500/50">
                Запустить камеру
            </button>
        </div>
    </div>
    
    <!-- AR Контейнер -->
    <div id="ar-container" class="hidden"></div>
    
    <!-- Кнопка Назад -->
    <button id="back-btn" class="back-btn hidden">
        ← Назад
    </button>
    
    <script type="module" src="app.js"></script>
</body>
</html>
